- id: doi:10.1038/s41598-023-48200-7
  title: Drivers of social influence in the Twitter migration to Mastodon
  authors:
  - Lucio La Cava
  - Luca Maria Aiello
  - Andrea Tagarelli
  publisher: Scientific Reports
  date: '2023-12-07'
  link: https://doi.org/gs8c7x
  image: ./../images/migration.jpg
  description: "The migration of Twitter users to Mastodon following Elon Musk\u2019\
    s acquisition presents a unique opportunity to study collective behavior and gain\
    \ insights into the drivers of coordinated behavior in online media. We analyzed\
    \ the social network and the public conversations of about 75,000 migrated users\
    \ and observed that the temporal trace of their migrations is compatible with\
    \ a phenomenon of social influence, as described by a compartmental epidemic model\
    \ of information diffusion. Drawing from prior research on behavioral change,\
    \ we delved into the factors that account for variations of the effectiveness\
    \ of the influence process across different Twitter communities. Communities in\
    \ which the influence process unfolded more rapidly exhibit lower density of social\
    \ connections, higher levels of signaled commitment to migrating, and more emphasis\
    \ on shared identity and exchange of factual knowledge in the community discussion.\
    \ These factors account collectively for 57% of the variance in the observed data.\
    \ Our results highlight the joint importance of network structure, commitment,\
    \ and psycho-linguistic aspects of social interactions in characterizing grassroots\
    \ collective action, and contribute to deepen our understanding of the mechanisms\
    \ that drive processes of behavior change of online groups."
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/s10506-023-09374-7
  title: Bringing order into the realm of Transformer-based language models for artificial
    intelligence and law
  authors:
  - Candida M. Greco
  - Andrea Tagarelli
  publisher: Artificial Intelligence and Law
  date: '2023-11-20'
  link: https://doi.org/gs75zb
  image: ./../images/AIlaw.jpg
  description: Transformer-based language models (TLMs) have widely been recognized
    to be a cutting-edge technology for the successful development of deep-learning-based
    solutions to problems and applications that require natural language processing
    and understanding. Like for other textual domains, TLMs have indeed pushed the
    state-of-the-art of AI approaches for many tasks of interest in the legal domain.
    Despite the first Transformer model being proposed about six years ago, there
    has been a rapid progress of this technology at an unprecedented rate, whereby
    BERT and related models represent a major reference, also in the legal domain.
    This article provides the first systematic overview of TLM-based methods for AI-driven
    problems and tasks in the legal sphere. A major goal is to highlight research
    advances in this field so as to understand, on the one hand, how the Transformers
    have contributed to the success of AI in supporting legal processes, and on the
    other hand, what are the current limitations and opportunities for further research
    development.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/S10618-023-00937-5
  title: A combinatorial multi-armed bandit approach to correlation clustering
  authors:
  - F. Gullo
  - D. Mandaglio
  - A. Tagarelli
  publisher: Data Mining and Knowledge Discovery
  date: '2023-06-29'
  link: https://doi.org/gs8dmg
  image: ./../images/cc4.jpg
  description: Given a graph whose edges are assigned positive-type and negative-type
    weights, the problem of correlation clustering aims at grouping the graph vertices
    so as to minimize (resp. maximize) the sum of negative-type (resp. positive-type)
    intra-cluster weights plus the sum of positive-type (resp. negative-type) inter-cluster
    weights. In correlation clustering, it is typically assumed that the weights are
    readily available. This is a rather strong hypothesis, which is unrealistic in
    several scenarios. To overcome this limitation, in this work we focus on the setting
    where edge weights of a correlation-clustering instance are unknown, and they
    have to be estimated in multiple rounds, while performing the clustering. The
    clustering solutions produced in the various rounds provide a feedback to properly
    adjust the weight estimates, and the goal is to maximize the cumulative quality
    of the clusterings. We tackle this problem by resorting to the reinforcement-learning
    paradigm, and, specifically, we design for the first time a Combinatorial Multi-Armed
    Bandit (CMAB) framework for correlation clustering. We provide a variety of contributions,
    namely (1) formulations of the minimization and maximization variants of correlation
    clustering in a CMAB setting; (2) adaptation of well-established CMAB algorithms
    to the correlation-clustering context; (3) regret analyses to theoretically bound
    the accuracy of these algorithms; (4) design of further (heuristic) algorithms
    to have the probability constraint satisfied at every round (key condition to
    soundly adopt efficient yet effective algorithms for correlation clustering as
    CMAB oracles); (5) extensive experimental comparison among a variety of both CMAB
    and non-CMAB approaches for correlation clustering.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1016/j.dib.2023.109749
  title: 'Unraveling the NFT economy: A comprehensive collection of Non-Fungible Token
    transactions and metadata'
  authors:
  - Davide Costa
  - Lucio La Cava
  - Andrea Tagarelli
  publisher: Data in Brief
  date: '2023-12-01'
  link: https://doi.org/gs35cq
  image: ./../images/nftdataset.jpg
  description: Non-Fungible Tokens (NFTs) have emerged as the most representative
    application of blockchain technology in recent years, fostering the development
    of the Web3. Nonetheless, while the interest in NFTs rapidly boomed, creating
    unprecedented fervour in traders and creators, the demand for highly representative
    and up-to-date data to shed light on such an intriguing yet complex domain mostly
    remained unmet. To pursue this objective, we introduce a large collection of NFT
    transactions and associated metadata that correspond to trading operations between
    2021 and 2023. Our developed dataset is the most extensive and representative
    in the NFT landscape to date, as it contains more than 70 M transactions performed
    by more than 6 M users across 36.3 M NFTs and 281 K collections. Moreover, this
    dataset boasts a wealth of metadata, including encoded textual descriptions and
    multimedia content, thus being suitable for a plethora of tasks relevant to database
    systems, AI, data science, Web and network science fields. This dataset represents
    a unique resource for researchers and industry practitioners to delve into the
    inner workings of NFTs through a multitude of perspectives, paving the way for
    unprecedented opportunities across multiple research fields.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.48550/arXiv.2305.19056
  title: Drivers of social influence in the Twitter migration to Mastodon
  authors:
  - Lucio La Cava
  - Luca Maria Aiello
  - Andrea Tagarelli
  publisher: arXiv
  date: '2023-01-01'
  link: https://doi.org/gs35cw
  image: ./../images/migration.jpg
  description: The migration of Twitter users to Mastodon following Elon Musk's acquisition
    presents a unique opportunity to study collective behavior and gain insights into
    the drivers of coordinated behavior in online media. We analyzed the social network
    and the public conversations of about 75,000 migrated users and observed that
    the temporal trace of their migrations is compatible with a phenomenon of social
    influence, as described by a compartmental epidemic model of information diffusion.
    Drawing from prior research on behavioral change, we delved into the factors that
    account for variations across different Twitter communities in the effectiveness
    of the spreading of the influence to migrate. Communities in which the influence
    process unfolded more rapidly exhibit lower density of social connections, higher
    levels of signaled commitment to migrating, and more emphasis on shared identity
    and exchange of factual knowledge in the community discussion. These factors account
    collectively for 57% of the variance in the observed data. Our results highlight
    the joint importance of network structure, commitment, and psycho-linguistic aspects
    of social interactions in describing grassroots collective action, and contribute
    to deepen our understanding of the mechanisms driving processes of behavior change
    of online groups.
