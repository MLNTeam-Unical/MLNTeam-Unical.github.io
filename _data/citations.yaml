- id: doi:10.48550/arXiv.2510.07226
  title: Machines in the Crowd? Measuring the Footprint of Machine-Generated Text
    on Reddit
  authors:
  - Lucio La Cava
  - Luca Maria Aiello
  - Andrea Tagarelli
  publisher: arXiv
  date: '2025-10-08'
  link: https://doi.org/hbk6ks
  image: ./../images/default.jpg
  description: Generative Artificial Intelligence is reshaping online communication
    by enabling large-scale production of Machine-Generated Text (MGT) at low cost.
    While its presence is rapidly growing across the Web, little is known about how
    MGT integrates into social media environments. In this paper, we present the first
    large-scale characterization of MGT on Reddit. Using a state-of-the-art statistical
    method for detection of MGT, we analyze over two years of activity (2022-2024)
    across 51 subreddits representative of Reddit's main community types such as information
    seeking, social support, and discussion. We study the concentration of MGT across
    communities and over time, and compared MGT to human-authored text in terms of
    social signals it expresses and engagement it receives. Our very conservative
    estimate of MGT prevalence indicates that synthetic text is marginally present
    on Reddit, but it can reach peaks of up to 9% in some communities in some months.
    MGT is unevenly distributed across communities, more prevalent in subreddits focused
    on technical knowledge and social support, and often concentrated in the activity
    of a small fraction of users. MGT also conveys distinct social signals of warmth
    and status giving typical of language of AI assistants. Despite these stylistic
    differences, MGT achieves engagement levels comparable than human-authored content
    and in a few cases even higher, suggesting that AI-generated text is becoming
    an organic component of online social discourse. This work offers the first perspective
    on the MGT footprint on Reddit, paving the way for new investigations involving
    platform governance, detection strategies, and community dynamics.
