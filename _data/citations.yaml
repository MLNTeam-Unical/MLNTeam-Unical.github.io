  - Candida M. Greco
  - Davide Picca
  - Andrea Tagarelli
  publisher: Proceedings of the 31st International Conference on Computational Linguistics
  date: '2025-01-25'
  link: https://aclanthology.org/2025.coling-main.638/
  image: ./../images/default.jpg
  description: Moralities, emotions, and events are complex aspects of human cognition,
    which are often treated separately since capturing their combined effects is challenging,
    especially due to the lack of annotated data. Leveraging their interrelations
    hence becomes crucial for advancing the understanding of human moral behaviors.
    In this work, we propose ME2-BERT, the first holistic framework for fine-tuning
    a pre-trained language model like BERT to the task of moral foundation prediction.
    ME2-BERT integrates events and emotions for learning domain-invariant morality-relevant
    text representations. Our extensive experiments show that ME2-BERT outperforms
    existing state-of-the-art methods for moral foundation prediction, with an average
    increase up to 35% in the out-of-domain scenario.
