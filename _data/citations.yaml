- id: doi:10.1609/aaai.v39i2.32125
  title: Open Models, Closed Minds? On Agents Capabilities in Mimicking Human Personalities
    through Open Large Language Models
  authors:
  - Lucio La Cava
  - Andrea Tagarelli
  publisher: Proceedings of the AAAI Conference on Artificial Intelligence
  date: '2025-04-11'
  link: https://doi.org/g9fgpb
  image: ./../images/mbti.jpg
  description: The emergence of unveiling human-like behaviors in Large Language Models
    (LLMs) has led to a closer connection between NLP and human psychology. However,
    research on the personalities exhibited by LLMs has largely been confined to limited
    investigations using individual psychological tests, primarily focusing on a small
    number of commercially licensed LLMs. This approach overlooks the extensive use
    and significant advancements observed in open-source LLMs. This work aims to address
    both the above limitations by conducting an in-depth investigation of a significant
    body of 12 LLM Agents based on the most representative Open models, through the
    two most well-known psychological assessment tests, namely Myers-Briggs Type Indicator
    (MBTI) and Big Five Inventory (BFI). Our approach involves evaluating the intrinsic
    personality traits of LLM agents and determining the extent to which these agents
    can mimic human personalities when conditioned by specific personalities and roles.
    Our findings unveil that (i) each LLM agent showcases distinct human personalities;
    (ii) personality-conditioned prompting produces varying effects on the agents,
    with only few successfully mirroring the imposed personality, while most of them
    being ``closed-minded'' (i.e., they retain their intrinsic traits); and (iii)
    combining role and personality conditioning can enhance the agents' ability to
    mimic human personalities. Our work represents a step up in understanding the
    dense relationship between NLP and human psychology through the lens of LLMs.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/s00146-025-02225-w
  title: 'A survey on moral foundation theory and pre-trained language models: current
    advances and challenges'
  authors:
  - Lorenzo Zangari
  - Candida Maria Greco
  - Davide Picca
  - Andrea Tagarelli
  publisher: AI &amp; SOCIETY
  date: '2025-03-24'
  link: https://doi.org/g95h6c
  image: ./../images/default.jpg
  description: Moral values have deep roots in early civilizations, codified within
    norms and laws that regulated societal order and the common good. They play a
    crucial role in understanding the psychological basis of human behavior and cultural
    orientation. The moral foundation theory (MFT) is a well-established framework
    that identifies the core moral foundations underlying the manner in which different
    cultures shape individual and social lives. Recent advancements in natural language
    processing, particularly pre-trained language models (PLMs), have enabled the
    extraction and analysis of moral dimensions from textual data. This survey presents
    a comprehensive review of MFT-informed PLMs, providing an analysis of moral tendencies
    in PLMs and their application in the context of MFT. We also review relevant datasets
    and lexicons and discuss trends, limitations, and future directions. By providing
    a structured overview of the intersection between PLMs and MFT, this work bridges
    moral psychology insights within the realm of PLMs, paving the way for further
    research and development in creating morally aware AI systems.
