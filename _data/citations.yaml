    \ compliance checking struggles with scaling due to the increasing volume of user-generated\
    \ content and a limited number of moderators. Recent advancements in Natural Language\
    \ Understanding demonstrated by Large Language Models unlock new opportunities\
    \ for automated content compliance verification. This work evaluates six AI-agents\
    \ built on Open-LLMs for automated rule compliance checking in Decentralized Social\
