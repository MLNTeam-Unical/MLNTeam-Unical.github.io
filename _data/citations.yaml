  description: We present PersonaGen, a novel dataset for investigating persona-driven
    machine-generated text (MGT) produced by Open Large Language Models (OLLMS). PersonaGen
    is specifically designed to investigate how synthetic persona profiles affect,
    guide, or manifest in MGT. We built PersonaGen by pairing curated persona-profiles
    (i.e., description of characteristics, background, and goals) across eight thematic
    domains (e.g., Physics, Education, Medicine) with prompts covering various narrative
    or opinion-style content (e.g., stories, commonsense). Open-ended generations
    were produced by six representative OLLMs, yielding a total of 1.44 million persona-driven
    generations. PersonaGen supports multiple research tasks, such as machine-generated
    text attribution, persona category detection, and persona profile identification,
    thus providing a valuable resource for studying LLM controllability and role-playing
    behavior, as well as the impact of persona profile conditioning in downstream
    tasks. We have released PersonaGen on the Hugging Face platform at https://doi.org/10.57967/hf/5805.
