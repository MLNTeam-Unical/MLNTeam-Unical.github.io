  title: 'A Survey on Moral Foundation Theory and Pre-Trained Language Models: Current
    Advances and Challenges'
  authors:
  - Lorenzo Zangari
  - Candida M. Greco
  - Davide Picca
  - Andrea Tagarelli
  publisher: arXiv
  date: '2024-10-15'
  link: https://doi.org/g8z8p8
  image: ./../images/default.jpg
  description: Moral values have deep roots in early civilizations, codified within
    norms and laws that regulated societal order and the common good. They play a
    crucial role in understanding the psychological basis of human behavior and cultural
    orientation. The Moral Foundation Theory (MFT) is a well-established framework
    that identifies the core moral foundations underlying the manner in which different
    cultures shape individual and social lives. Recent advancements in natural language
    processing, particularly Pre-trained Language Models (PLMs), have enabled the
    extraction and analysis of moral dimensions from textual data. This survey presents
    a comprehensive review of MFT-informed PLMs, providing an analysis of moral tendencies
    in PLMs and their application in the context of the MFT. We also review relevant
    datasets and lexicons and discuss trends, limitations, and future directions.
    By providing a structured overview of the intersection between PLMs and MFT, this
    work bridges moral psychology insights within the realm of PLMs, paving the way
    for further research and development in creating morally aware AI systems.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.3233/FAIA240862
  title: Is Contrasting All You Need? Contrastive Learning for the Detection and Attribution
    of AI-generated Text
  authors:
  - Lucio La Cava
  - Davide Costa
  - Andrea Tagarelli
  publisher: Frontiers in Artificial Intelligence and Applications
  date: '2024-10-12'
  link: https://doi.org/g954v8
  image: ./../images/default.jpg
  description: The significant progress in the development of Large Language Models
    has contributed to blurring the distinction between human and AI-generated text.
    The increasing pervasiveness of AI-generated text and the difficulty in detecting
    it poses new challenges for our society. In this paper, we tackle the problem
    of detecting and attributing AI-generated text by proposing WhosAI, a triplet-network
    contrastive learning framework designed to predict whether a given input text
    has been generated by humans or AI and to unveil the authorship of the text. Unlike
    most existing approaches, our proposed framework is conceived to learn semantic
    similarity representations from multiple generators at once, thus equally handling
    both detection and attribution tasks. Furthermore, WhosAI is model-agnostic and
    scalable to the release of new AI text-generation models by incorporating their
    generated instances into the embedding space learned by our framework. Experimental
    results on the TuringBench benchmark of 200K news articles show that our proposed
    framework achieves outstanding results in both the Turing Test and Authorship
    Attribution tasks, outperforming all the methods listed in the TuringBench benchmark
    leaderboards.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/s10994-024-06581-4
  title: Neural discovery of balance-aware polarized communities
  authors:
  - Francesco Gullo
  - Domenico Mandaglio
  - Andrea Tagarelli
  publisher: Machine Learning
  date: '2024-08-12'
  link: https://doi.org/gt73st
  image: ./../images/default.jpg
  description: "Signed graphs are a model to depict friendly (positive) or antagonistic\
    \ (negative) interactions (edges) among users (nodes). 2-Polarized-Communities\
    \ (2pc) is a well-established combinatorial-optimization problem whose goal is\
    \ to find two polarized communities from a signed graph, i.e., two subsets of\
    \ nodes (disjoint, but not necessarily covering the entire node set) which exhibit\
    \ a high number of both intra-community positive edges and negative inter-community\
    \ edges. The state of the art in 2pc suffers from the limitations that (i) existing\
    \ methods rely on a single (optimal) solution to a continuous relaxation of the\
    \ problem in order to produce the ultimate discrete solution via rounding, and\
    \ (ii) 2pc objective function comes with no control on size balance among communities.\
    \ In this paper, we provide advances to the 2pc problem by addressing both these\
    \ limitations, with a twofold contribution. First, we devise a novel neural approach\
    \ that allows for soundly and elegantly explore a variety of suboptimal solutions\
    \ to the relaxed 2pc problem, so as to pick the one that leads to the best discrete\
    \ solution after rounding. Second, we introduce a generalization of 2pc objective\
    \ function \u2013 termed -polarity \u2013 which fosters size balance among communities,\
    \ and we incorporate it into the proposed machine-learning framework. Extensive\
    \ experiments attest high accuracy of our approach, its superiority over the state\
    \ of the art, and capability of function -polarity to discover high-quality size-balanced\
    \ communities."
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/s41109-024-00633-3
  title: 'DyHANE: dynamic heterogeneous attributed network embedding through experience
    node replay'
  authors:
  - Liliana Martirano
  - Dino Ienco
  - Roberto Interdonato
  - Andrea Tagarelli
  publisher: Applied Network Science
  date: '2024-07-15'
  link: https://doi.org/gt73sp
  image: ./../images/default.jpg
  description: "With real-world network systems typically comprising a large number\
    \ of interactive components and inherently dynamic, Graph Continual Learning (GCL)\
    \ has gained increasing popularity in recent years. Furthermore, most applications\
    \ involve multiple entities and relationships with associated attributes, which\
    \ has led to widely adopting Heterogeneous Information Networks (HINs) for capturing\
    \ such rich structural and semantic meaning. In this context, we deal with the\
    \ problem of learning multi-type node representations in a time evolving graph\
    \ setting, harnessing the expressive power of Graph Neural Networks (GNNs). To\
    \ this purpose, we propose a novel framework, named DyHANE\u2014Dynamic Heterogeneous\
    \ Attributed Network Embedding, which dynamically identifies a representative\
    \ sample of multi-typed nodes as training set and updates the parameters of a\
    \ GNN module, enabling the generation of up-to-date representations for all nodes\
    \ in the network. We show the advantage of employing HINs on a data-incremental\
    \ classification task. We compare the results obtained by DyHANE on a multi-step,\
    \ incremental heterogeneous GAT model trained on a sample of changed and unchanged\
    \ nodes, with the results obtained by either the same model trained from scratch\
    \ or the same model trained solely on changed nodes. We demonstrate the effectiveness\
    \ of the proposed approach in facing two major related challenges - (i) to avoid\
    \ model re-train from scratch if only a subset of the network has been changed\
    \ and (ii) to mitigate the risk of losing established patterns if the new nodes\
    \ exhibit unseen properties. To the best of our knowledge, this is the first work\
    \ that deals with the task of (deep) graph continual learning on HINs."
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1016/j.eswa.2024.123320
  title: A meta-active learning approach exploiting instance importance
  authors:
  - Sergio Flesca
  - Domenico Mandaglio
  - Francesco Scala
  - Andrea Tagarelli
  publisher: Expert Systems with Applications
  date: '2024-06-08'
  link: https://doi.org/gt73sv
  image: ./../images/default.jpg
  description: Active learning is focused on minimizing the effort required to obtain
    labeled data by iteratively choosing fresh data samples for training a machine
    learning model. One of the primary challenges in active learning involves the
    selection of the most informative instances for labeling by an annotation oracle
    at each iteration. A viable approach is to develop an active learning strategy
    that aligns with the performance of a meta-learning model. This strategy evaluates
    the quality of previously selected instances and subsequently trains a machine
    learning model to predict the quality of instances to be labeled in the current
    iteration. This paper introduces a novel approach to learning for active learning,
    wherein instances are chosen for labeling based on their potential to induce the
    most substantial change in the current classifier. We explore various strategies
    for assessing the significance of an instance, taking into account variations
    in the learning gradient of the classification model. Our approach can be applied
    to any classifier that can be trained using gradient descent optimization. Here,
    we present a formulation that leverages a deep neural network model, which has
    not been extensively explored in existing learning-to-active-learn methodologies.
    Through experimental validation, our approach demonstrates promising results,
    especially in scenarios where there are limited initially labeled instances, particularly
    when the number of labeled instances per class is extremely limited.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1145/3589334.3645646
  title: Link Prediction on Multilayer Networks through Learning of Within-Layer and
    Across-Layer Node-Pair Structural Features and Node Embedding Similarity
  authors:
  - Lorenzo Zangari
  - Domenico Mandaglio
  - Andrea Tagarelli
  publisher: Proceedings of the ACM Web Conference 2024
  date: '2024-05-17'
  link: https://doi.org/gt73sw
  image: ./../images/default.jpg
  description: Link prediction has traditionally been studied in the context of simple
    graphs, although real-world networks are inherently complex as they are often
    comprised of multiple interconnected components, or layers. Predicting links in
    such network systems, or multilayer networks, require to consider both the internal
    structure of a target layer as well as the structure of the other layers in a
    network, in addition to layer-specific node-attributes when available. This problem
    poses several challenges, even for graph neural network based approaches despite
    their successful and wide application to a variety of graph learning problems.
    In this work, we aim to fill a lack of multilayer graph representation learning
    methods designed for link prediction. Our proposal is a novel neural-network-based
    learning framework for link prediction on (attributed) multilayer networks, whose
    key idea is to combine (i) pairwise similarities of multilayer node embeddings
    learned by a graph neural network model, and (ii) structural features learned
    from both within-layer and across-layer link information based on overlapping
    multilayer neighborhoods. Extensive experimental results have shown that our framework
    consistently outperforms both single-layer and multilayer methods for link prediction
    on popular real-world multilayer networks, with an average percentage increase
    in AUC up to 38%. We make source code and evaluation data available at https://mlnteam-unical.github.io/resources/.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1145/3614419.3644013
  title: Polarization in Decentralized Online Social Networks
  authors:
  - Lucio La Cava
  - Domenico Mandaglio
  - Andrea Tagarelli
  publisher: ACM Web Science Conference
  date: '2024-05-04'
  link: https://doi.org/gt73sx
  image: ./../images/default.jpg
  description: "Centralized social media platforms are currently experiencing a shift\
    \ in user engagement, drawing attention to alternative paradigms like Decentralized\
    \ Online Social Networks (DOSNs). The rising popularity of DOSNs finds its root\
    \ in the accessibility of open-source software, enabling anyone to create a new\
    \ instance (i.e., server) and participate in a decentralized network known as\
    \ Fediverse. Despite this growing momentum, there has been a lack of studies addressing\
    \ the effect of positive and negative interactions among instances within DOSNs.\
    \ This work aims to fill this gap by presenting a preliminary examination of instances\u2019\
    \ polarization in DOSNs, focusing on Mastodon \u2014 the most widely recognized\
    \ decentralized social media platform, boasting over 10M users and nearly 20K\
    \ instances to date. Our results suggest that polarization in the Fediverse emerges\
    \ in unique ways, influenced by the desire to foster a federated environment between\
    \ instances, also facilitating the isolation of instances that may pose potential\
    \ risks to the Fediverse."
  plugin: sources.py
  file: sources.yaml
- id: doi:10.48550/ARXIV.2401.14524
  title: Evaluating GPT-3.5's Awareness and Summarization Abilities for European Constitutional
    Texts with Shared Topics
  authors:
  - Candida M. Greco
  - A. Tagarelli
  publisher: arXiv
  date: '2024-01-25'
  link: https://doi.org/gtm7ws
  image: ./../images/liraiEU2.jpg
  description: Constitutions are foundational legal documents that underpin the governmental
    and societal structures. As such, they are a reflection of a nation's cultural
    and social uniqueness, but also contribute to establish topics of universal importance,
    like citizens' rights and duties (RD). In this work, using the renowned GPT-3.5,
    we leverage generative large language models to understand constitutional passages
    that transcend national boundaries. A key contribution of our study is the introduction
    of a novel application of abstractive summarization on a multi-source collection
    of constitutional texts, with a focus on European countries' constitution passages
    related to RD topics. Our results show the meaningfulness of GPT-3.5 to produce
    informative, coherent and faithful summaries capturing RD topics across European
    countries.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.48550/arXiv.2401.07115
  title: Open Models, Closed Minds? On Agents Capabilities in Mimicking Human Personalities
    through Open Large Language Models
  authors:
  - Lucio La Cava
  - Andrea Tagarelli
  publisher: arXiv
  date: '2024-01-13'
  link: https://doi.org/gtd3x7
  image: ./../images/mbti.jpg
  description: The emergence of unveiling human-like behaviors in Large Language Models
    (LLMs) has led to a closer connection between NLP and human psychology. Scholars
    have been studying the inherent personalities exhibited by LLMs and attempting
    to incorporate human traits and behaviors into them. However, these efforts have
    primarily focused on commercially-licensed LLMs, neglecting the widespread use
    and notable advancements seen in Open LLMs. This work aims to address this gap
    by employing a set of 12 LLM Agents based on the most representative Open models
    and subject them to a series of assessments concerning the Myers-Briggs Type Indicator
    (MBTI) test and the Big Five Inventory (BFI) test. Our approach involves evaluating
    the intrinsic personality traits of Open LLM agents and determining the extent
    to which these agents can mimic human personalities when conditioned by specific
    personalities and roles. Our findings unveil that (i) each Open LLM agent showcases
    distinct human personalities; (ii) personality-conditioned prompting produces
    varying effects on the agents, with only few successfully mirroring the imposed
    personality, while most of them being ``closed-minded'' (i.e., they retain their
    intrinsic traits); and (iii) combining role and personality conditioning can enhance
    the agents' ability to mimic human personalities. Our work represents a step up
    in understanding the dense relationship between NLP and human psychology through
    the lens of Open LLMs.
  plugin: sources.py
  file: sources.yaml
- id: ' '
  title: GDPR Article Retrieval based on Domain-adaptive and Task-adaptive Legal Pre-trained
    Language Models
  authors:
  - Andrea Simeri
  - Andrea Tagarelli
  publisher: ACM Hypertext-2023 Workshop on 'Legal Information Retrieval meets Artificial
    Intelligence Workshop' (LIRAI)
  date: '2023-12-01'
  link: https://ceur-ws.org/Vol-3594/paper5.pdf
  image: ./../images/liraiGDPR.jpg
  plugin: sources.py
  file: sources.yaml
  description: "The General Data Protection Regulation (GDPR) is an European regulation\
    \ on data protection and privacy for all individuals within the European Union\
    \ (EU) and the European Economic Area (EEA), and for all foreign subjects dealing\
    \ with European citizens data. Therefore, the GDPR has important legislation implications\
    \ that hold beyond EU member states. In this paper, we address the problem of\
    \ GDPR article retrieval through the use of pre-trained language models (PLMs).\
    \ Our approach features several key aspects, which include both domain-general\
    \ and domain-specific pre-trained BERT models, further powered by self-supervised\
    \ task-adaptive pre-training stages, with or without data enrichment based on\
    \ recitals. Our study endeavors to demonstrate the potential of PLMs in addressing\
    \ the challenges posed by the GDPR\u2019s intricate legal framework, thus ultimately\
    \ facilitating efficient access to GDPR provisions for government agencies, law\
    \ firms, legal professionals, and citizens alike."
- id: '  '
  title: Exploring domain and task adaptation of LamBERTa models for article retrieval
    on the Italian Civil Code
  authors:
  - Andrea Simeri
  - Andrea Tagarelli
  publisher: The 19th Conference on Information and Research science Connecting to
    Digital and Library science (IRCDL)
  date: '2023-04-21'
  link: https://ceur-ws.org/Vol-3365/paper4.pdf
  image: ./../images/AIlaw.jpg
  description: "This paper is concerned with AI-based NLP solutions to the law article\
    \ retrieval problem, with application to the Italian legal domain and, particularly,\
    \ to the Italian Civil Code. Based upon the current state-of- the-art on this\
    \ topic, we revise our early LamBERTa framework in a twofold way relating its\
    \ domain- adaptation feature - replacing the general-domain pre-trained model\
    \ with a legal-specific one to fine-tune for the task of article retrieval, and\
    \ delving into the injection of out-of-vocabulary legal terms into the models\u2019\
    \ tokenizer. Extensive experimental evaluation based on different collections\
    \ of query sets, along with qualitative analysis on the models\u2019 prediction\
    \ interpretability, have unveiled interesting findings about the combined effect\
    \ of domain- and task-adaptation of an Italian BERT model on the task of law article\
    \ retrieval."
