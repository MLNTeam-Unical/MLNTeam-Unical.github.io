- id: doi:10.1109/ICT-DM58371.2023.10286927
  title: 'Evolution of the Social Debate on Climate Crisis: Insights from Twitter
    During the Conferences of the Parties'
  authors:
  - Liliana Martirano
  - Lucio La Cava
  - Andrea Tagarelli
  publisher: 2023 International Conference on Information and Communication Technologies
    for Disaster Management (ICT-DM)
  date: '2023-09-13'
  link: https://doi.org/gs8dmh
  image: ./../images/climate.jpg
  description: Social media have long been recognized as a valuable proxy for investigating
    users' opinions by echoing virtual venues where individuals engage in daily discussions
    on a wide range of topics. Among them, climate change is gaining momentum due
    to its large-scale impact, tangible consequences for society, and enduring nature.
    In this work, we investigate the social debate surrounding climate emergency,
    with particular emphasis on the Conference of the Parties (COP), the foremost
    global forum for multilateral discussion on climate-related matters. To this aim,
    we leverage graph mining and text mining techniques to analyze a large corpus
    of tweets spanning 7 years, aiming to uncover the fundamental patterns underlying
    the climate debate, thus providing valuable support for strategic and operational
    decision-making. Our contribution in this work is manifold - (i) we provide insights
    into the key social actors involved in the climate debate and their relationships,
    (ii) we unveil the main topics discussed during COPs within the social landscape,
    (iii) we assess the evolution of users' sentiment and emotions across time. Furthermore,
    our proposed approach has the potential to scale up to other emergency issues,
    highlighting its versatility and potential for broader use in analyzing the increasingly
    debated emergent phenomena.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1145/3539618.3591821
  title: 'SONAR: Web-based Tool for Multimodal Exploration of Non-Fungible Token Inspiration
    Networks'
  authors:
  - Lucio La Cava
  - Davide Costa
  - Andrea Tagarelli
  publisher: Proceedings of the 46th International ACM SIGIR Conference on Research
    and Development in Information Retrieval
  date: '2023-07-18'
  link: https://doi.org/gs35cr
  image: ./../images/sonar.jpg
  description: In this work, we present SONAR, a web-based tool for multimodal exploration
    of Non-Fungible Token (NFT) inspiration networks. SONAR is conceived to support
    both creators and traders in the emerging Web3 by providing an interactive visualization
    of the inspiration-driven connections between NFTs, at both individual level and
    collection level. SONAR can hence be useful to identify new investment opportunities
    as well as anomalous inspirations. To demonstrate SONAR's capabilities, we present
    an application to the largest and most representative dataset concerning the NFT
    landscape to date, showing how our proposed tool can scale and ensure high-level
    user experience up to millions of edges.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1145/3543507.3583520
  title: 'Show me your NFT and I tell you how it will perform: Multimodal representation
    learning for NFT selling price prediction'
  authors:
  - Davide Costa
  - Lucio La Cava
  - Andrea Tagarelli
  publisher: Proceedings of the ACM Web Conference 2023
  date: '2023-04-30'
  link: https://doi.org/gs35cs
  image: ./../images/merlin.jpg
  description: "Non-Fungible Tokens (NFTs) represent deeds of ownership, based on\
    \ blockchain technologies and smart contracts, of unique crypto assets on digital\
    \ art forms (e.g., artworks or collectibles). In the spotlight after skyrocketing\
    \ in 2021, NFTs have attracted the attention of crypto enthusiasts and investors\
    \ intent on placing promising investments in this profitable market. However,\
    \ the NFT financial performance prediction has not been widely explored to date.\
    \ In this work, we address the above problem based on the hypothesis that NFT\
    \ images and their textual descriptions are essential proxies to predict the NFT\
    \ selling prices. To this purpose, we propose MERLIN, a novel multimodal deep\
    \ learning framework designed to train Transformer-based language and visual models,\
    \ along with graph neural network models, on collections of NFTs\u2019 images\
    \ and texts. A key aspect in MERLIN is its independence on financial features,\
    \ as it exploits only the primary data a user interested in NFT trading would\
    \ like to deal with, i.e., NFT images and textual descriptions. By learning dense\
    \ representations of such data, a price-category classification task is performed\
    \ by MERLIN models, which can also be tuned according to user preferences in the\
    \ inference phase to mimic different risk-return investment profiles. Experimental\
    \ evaluation on a publicly available dataset has shown that MERLIN models achieve\
    \ significant performances according to several financial assessment criteria,\
    \ fostering profitable investments, and also beating baseline machine-learning\
    \ classifiers based on financial features."
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1145/3703411
  title: 'Visually Wired NFTs: Exploring the Role of Inspiration in Non-Fungible Tokens'
  authors:
  - Lucio La Cava
  - Davide Costa
  - Andrea Tagarelli
  publisher: ACM Transactions on the Web
  date: '2025-05-24'
  link: https://doi.org/g88mz4
  image: ./../images/visualinspirationnetw.jpg
  description: The fervor for Non-Fungible Tokens (NFTs) attracted countless creators,
    leading to a Big Bang of digital assets driven by latent or explicit forms of
    inspiration, as in many creative processes. This work exploits Vision Transformers
    and graph-based modeling to delve into visual inspiration phenomena between NFTs
    over the years, i.e., the visual influence that can be detected whenever an NFT
    appears to be visually close to another that was published earlier in the market.
    Our goals include unveiling the main structural traits that shape visual inspiration
    networks, exploring the interrelation between visual inspiration and asset performances,
    investigating crypto influence on inspiration processes, and explaining the inspiration
    relationships among NFTs. Our findings unveil how the pervasiveness of inspiration
    led to a temporary saturation of the visual feature space, the impact of the dichotomy
    between inspiring and inspired NFTs on their financial performance, and an intrinsic
    self-regulatory mechanism between markets and inspiration waves. Our work can
    serve as a starting point for gaining a broader view of the evolution of Web3.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1016/j.patrec.2023.02.016
  title: 'Transformer-based language models for mental health issues: A survey'
  authors:
  - Candida M. Greco
  - Andrea Simeri
  - Andrea Tagarelli
  - Ester Zumpano
  publisher: Pattern Recognition Letters
  date: '2023-03-01'
  link: https://doi.org/gs35cz
  image: ./../images/health.jpg
  description: Early identification and prevention of mental health stresses and their
    outcomes has become of urgent importance worldwide. To this purpose, artificial
    intelligence provides a body of advanced computational tools that can effectively
    support decision-making clinical processes by modeling and analyzing the presence
    of a variety of mental health issues, particularly when these can be detected
    in text data. In this regard, Transformer-based language models (TLMs) have demonstrated
    exceptional efficacy in a number of NLP tasks also in the health domain. To the
    best of our knowledge, the use of TLMs for specifically addressing mental health
    issues has not been deeply investigated so far. In this paper, we aim to fill
    this gap in the literature by providing the first survey of methods using TLMs
    for text-based identification of mental health issues.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/s41109-022-00504-9
  title: 'Co-MLHAN: contrastive learning for multilayer heterogeneous attributed networks'
  authors:
  - Liliana Martirano
  - Lorenzo Zangari
  - Andrea Tagarelli
  publisher: Applied Network Science
  date: '2022-09-20'
  link: https://doi.org/gs35c2
  image: ./../images/comlhan.jpg
  description: Graph representation learning has become a topic of great interest
    and many works focus on the generation of high-level, task-independent node embeddings
    for complex networks. However, the existing methods consider only few aspects
    of networks at a time. In this paper, we propose a novel framework, named Co-MLHAN,
    to learn node embeddings for networks that are simultaneously multilayer, heterogeneous
    and attributed. We leverage contrastive learning as a self-supervised and task-independent
    machine learning paradigm and define a cross-view mechanism between two views
    of the original graph which collaboratively supervise each other. We evaluate
    our framework on the entity classification task. Experimental results demonstrate
    the effectiveness of Co-MLHAN and its variant Co-MLHAN-SA, showing their capability
    of exploiting across-layer information in addition to other types of knowledge.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1109/ICPR56361.2022.9956039
  title: Learning to Active Learn by Gradient Variation based on Instance Importance
  authors:
  - Sergio Flesca
  - Domenico Mandaglio
  - Francesco Scala
  - Andrea Tagarelli
  publisher: 2022 26th International Conference on Pattern Recognition (ICPR)
  date: '2022-08-21'
  link: https://doi.org/gs8dpg
  image: ./../images/lal.jpg
  description: A major challenge in active learning is to select the most informative
    instances to be labeled by an annotation oracle at each step. In this respect,
    one effective paradigm is to learn the active learning strategy that best suits
    the performance of a meta-learning model. This strategy first measures the quality
    of the instances selected in the previous steps and then trains a machine learning
    model that is used to predict the quality of instances to be labeled in the current
    step.In this paper, we propose a new approach of learning-to-active-learn that
    selects the instances to be labeled as the ones producing the maximum change to
    the current classifier. Our key idea is to select such instances according to
    their importance reflecting variations in the learning gradient of the classification
    model. Our approach can be instantiated with any classifier trainable via gradient
    descent optimization, and here we provide a formulation based on a deep neural
    network model, which has not deeply been investigated in existing learning-to-active-learn
    approaches. The experimental validation of our approach has shown promising results
    in scenarios characterized by relatively few initially labeled instances.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/978-3-031-18840-4_22
  title: When Correlation Clustering Meets Fairness Constraints
  authors:
  - Francesco Gullo
  - Lucio La Cava
  - Domenico Mandaglio
  - Andrea Tagarelli
  publisher: Lecture Notes in Computer Science
  date: '2022-01-01'
  link: https://doi.org/gs35cv
  image: ./../images/fairness.jpg
  description: The study of fairness-related aspects in data analysis is an active
    field of research, which can be leveraged to understand and control specific types
    of bias in decision-making systems. A major problem in this context is fair clustering,
    i.e., grouping data objects that are similar according to a common feature space,
    while avoiding biasing the clusters against or towards particular types of classes
    or sensitive features. In this work, we focus on a correlation-clustering method
    we recently introduced, and experimentally assess its performance in a fairness-aware
    context. We compare it to state-of-the-art fair-clustering approaches, both in
    terms of classic clustering quality measures and fairness-related aspects. Experimental
    evidence on public real datasets has shown that our method yields solutions of
    higher quality than the competing methods according to classic clustering-validation
    criteria, without neglecting fairness aspects.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1145/3477495.3531668
  title: LawNet-Viz - A Web-based System to Visually Explore Networks of Law Article
    References
  authors:
  - Lucio La Cava
  - Andrea Simeri
  - Andrea Tagarelli
  publisher: Proceedings of the 45th International ACM SIGIR Conference on Research
    and Development in Information Retrieval
  date: '2022-07-06'
  link: https://doi.org/gs35ct
  image: ./../images/lawnetviz.jpg
  description: We present LawNet-Viz, a web-based tool for the modeling, analysis
    and visualization of law reference networks extracted from a statute law corpus.
    LawNet-Viz is designed to support legal research tasks and help legal professionals
    as well as laymen visually exploring the article connections built upon the explicit
    law references detected in the article contents. To demonstrate LawNet-Viz, we
    show its application to the Italian Civil Code (ICC), which exploits a recent
    BERT-based model fine-tuned on the ICC. LawNet-Viz is a system prototype that
    is planned for product development.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1016/j.osnem.2022.100220
  title: 'Information consumption and boundary spanning in Decentralized Online Social
    Networks: The case of Mastodon users'
  authors:
  - Lucio La Cava
  - Sergio Greco
  - Andrea Tagarelli
  publisher: Online Social Networks and Media
  date: '2022-07-01'
  link: https://doi.org/gr6wmx
  image: ./../images/osnem22.jpg
  description: "Decentralized Online Social Networks (DOSNs) represent a growing trend\
    \ in the social media landscape, as opposed to the well-known centralized peers,\
    \ which are often in the spotlight due to privacy concerns and a vision typically\
    \ focused on monetization through user relationships. By exploiting open-source\
    \ software, DOSNs allow users to create their own servers, or instances, thus\
    \ favoring the proliferation of platforms that are independent yet interconnected\
    \ with each other in a transparent way. Nonetheless, the resulting cooperation\
    \ model, commonly known as the Fediverse, still represents a world to be fully\
    \ discovered, since existing studies have mainly focused on a limited number of\
    \ structural aspects of interest in DOSNs. In this work, we aim to fill a lack\
    \ of study on user relations and roles in DOSNs, by taking two main actions -\
    \ understanding the impact of decentralization on how users relate to each other\
    \ within their membership instance and/or across different instances, and unveiling\
    \ user roles that can explain two interrelated axes of social behavioral phenomena,\
    \ namely information consumption and boundary spanning. To this purpose, we build\
    \ our analysis on user networks from Mastodon, since it represents the most widely\
    \ used DOSN platform. We believe that the findings drawn from our study on Mastodon\
    \ users\u2019 roles and information flow can pave a way for further development\
    \ of fascinating research on DOSNs."
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/978-3-031-08473-7_45
  title: "A Comparison of\_Transformer-Based Language Models on\_NLP Benchmarks"
  authors:
  - Candida Maria Greco
  - Andrea Tagarelli
  - Ester Zumpano
  publisher: Lecture Notes in Computer Science
  date: '2022-01-01'
  link: https://doi.org/gs35c3
  image: ./../images/nldb22.jpg
  description: Since the advent of BERT, Transformer-based language models (TLMs)
    have shown outstanding effectiveness in several NLP tasks. In this paper, we aim
    at bringing order to the landscape of TLMs and their performance on important
    benchmarks for NLP. Our analysis sheds light on the advantages that some TLMs
    take over the others, but also unveils issues in making a complete and fair comparison
    in some situations.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1609/icwsm.v16i1.19391
  title: Network Analysis of the Information Consumption-Production Dichotomy in Mastodon
    User Behaviors
  authors:
  - Lucio La Cava
  - Sergio Greco
  - Andrea Tagarelli
  publisher: Proceedings of the International AAAI Conference on Web and Social Media
  date: '2022-05-31'
  link: https://doi.org/gr6wmw
  image: ./../images/icwsm22.jpg
  description: Decentralized Online Social Networks (DOSNs) are today an established
    alternative to the popular centralized counterparts. In this work, we push forward
    research on user behaviors in a decentralized context, by exploring the dichotomy
    between information consumption and production. Using the Mastodon user network
    as a proxy for the Fediverse landscape, we address two main research questions
    - Do the consumers, resp. producers, identified in one instance exhibit the same
    behavior consistently while interacting with other instances? and, Are there users
    who behave as consumers in one instance and simultaneously as producers in other
    instances, or vice versa? In this respect, our results reveal interesting traits
    of Mastodon users, yet unveil the emergence for further studies that can embrace
    other services in the Fediverse.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1145/3444688
  title: Community Detection in Multiplex Networks
  authors:
  - Matteo Magnani
  - Obaida Hanteer
  - Roberto Interdonato
  - Luca Rossi
  - Andrea Tagarelli
  publisher: ACM Computing Surveys
  date: '2021-05-08'
  link: https://doi.org/gjxkqf
  image: ./../images/mlnets6.jpg
  description: A multiplex network models different modes of interaction among same-type
    entities. In this article, we provide a taxonomy of community detection algorithms
    in multiplex networks. We characterize the different algorithms based on various
    properties and we discuss the type of communities detected by each method. We
    then provide an extensive experimental evaluation of the reviewed methods to answer
    three main questions - to what extent the evaluated methods are able to detect
    ground-truth communities, to what extent different methods produce similar community
    structures, and to what extent the evaluated methods are scalable. One goal of
    this survey is to help scholars and practitioners to choose the right methods
    for the data and the task at hand, while also emphasizing when such choice is
    problematic.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/s41109-021-00420-4
  title: Graph convolutional and attention models for entity classification in multilayer
    networks
  authors:
  - Lorenzo Zangari
  - Roberto Interdonato
  - "Antonio Cali\xF3"
  - Andrea Tagarelli
  publisher: Applied Network Science
  date: '2021-11-08'
  link: https://doi.org/gs35c4
  image: ./../images/attention.jpg
  description: Graph Neural Networks (GNNs) are powerful tools that are nowadays reaching
    state of the art performances in a plethora of different tasks such as node classification,
    link prediction and graph classification. A challenging aspect in this context
    is to redefine basic deep learning operations, such as convolution, on graph-like
    structures, where nodes generally have unordered neighborhoods of varying size.
    State-of-the-art GNN approaches such as Graph Convolutional Networks (GCNs) and
    Graph Attention Networks (GATs) work on monoplex networks only, i.e., on networks
    modeling a single type of relation among an homogeneous set of nodes. The aim
    of this work is to generalize such approaches by proposing a GNN framework for
    representation learning and semi-supervised classification in multilayer networks
    with attributed entities, and arbitrary number of layers and intra-layer and inter-layer
    connections between nodes. We instantiate our framework with two new formulations
    of GAT and GCN models, namely ML-GCN and ML-GAT, specifically devised for general,
    attributed multilayer networks. The proposed approaches are evaluated on an entity
    classification task on nine widely used real-world network datasets coming from
    different domains and with different structural characteristics. Results show
    that both our proposed ML-GAT and ML-GCN methods provide effective and efficient
    solutions to the problem of entity classification in multilayer attributed networks,
    being faster to learn and offering better accuracy than the competitors. Furthermore,
    results show how our methods are able to take advantage of the presence of real
    attributes for the entities, in addition to arbitrary inter-layer connections
    between the nodes in the various layers.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/s41109-021-00392-5
  title: Understanding the growth of the Fediverse through the lens of Mastodon
  authors:
  - Lucio La Cava
  - Sergio Greco
  - Andrea Tagarelli
  publisher: Applied Network Science
  date: '2021-09-01'
  link: https://doi.org/grc3p4
  image: ./../images/mastodon5.jpg
  description: Open-source, Decentralized Online Social Networks (DOSNs) are emerging
    as alternatives to the popular yet centralized and profit-driven platforms like
    Facebook or Twitter. In DOSNs, users can set up their own server, or instance,
    while they can actually interact with users of other instances. Moreover, by adopting
    the same communication protocol, DOSNs become part of a massive social network,
    namely the Fediverse. Mastodon is the most relevant platform in the Fediverse
    to date, and also the one that has attracted attention from the research community.
    Existing studies are however limited to an analysis of a relatively outdated sample
    of Mastodon focusing on few aspects at a user level, while several open questions
    have not been answered yet, especially at the instance level. In this work, we
    aim at pushing forward our understanding of the Fediverse by leveraging the primary
    role of Mastodon therein. Our first contribution is the building of an up-to-date
    and highly representative dataset of Mastodon. Upon this new data, we have defined
    a network model over Mastodon instances and exploited it to investigate three
    major aspects - the structural features of the Mastodon network of instances from
    a macroscopic as well as a mesoscopic perspective, to unveil the distinguishing
    traits of the underlying federative mechanism; the backbone of the network, to
    discover the essential interrelations between the instances; and the growth of
    Mastodon, to understand how the shape of the instance network has evolved during
    the last few years, also when broading the scope to account for instances belonging
    to other platforms. Our extensive analysis of the above aspects has provided a
    number of findings that reveal distinguishing features of Mastodon and that can
    be used as a starting point for the discovery of all the DOSN Fediverse.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/s10506-021-09301-8
  title: Unsupervised law article mining based on deep pre-trained language representation
    models with application to the Italian civil code
  authors:
  - Andrea Tagarelli
  - Andrea Simeri
  publisher: Artificial Intelligence and Law
  date: '2021-09-15'
  link: https://doi.org/gs35c5
  image: ./../images/lamberta.jpg
  description: Modeling law search and retrieval as prediction problems has recently
    emerged as a predominant approach in law intelligence. Focusing on the law article
    retrieval task, we present a deep learning framework named LamBERTa, which is
    designed for civil-law codes, and specifically trained on the Italian civil code.
    To our knowledge, this is the first study proposing an advanced approach to law
    article prediction for the Italian legal system based on a BERT (Bidirectional
    Encoder Representations from Transformers) learning framework, which has recently
    attracted increased attention among deep learning approaches, showing outstanding
    effectiveness in several natural language processing and learning tasks. We define
    LamBERTa models by fine-tuning an Italian pre-trained BERT on the Italian civil
    code or its portions, for law article retrieval as a classification task. One
    key aspect of our LamBERTa framework is that we conceived it to address an extreme
    classification scenario, which is characterized by a high number of classes, the
    few-shot learning problem, and the lack of test query benchmarks for Italian legal
    prediction tasks. To solve such issues, we define different methods for the unsupervised
    labeling of the law articles, which can in principle be applied to any law article
    code system. We provide insights into the explainability and interpretability
    of our LamBERTa models, and we present an extensive experimental analysis over
    query sets of different type, for single-label as well as multi-label evaluation
    tasks. Empirical evidence has shown the effectiveness of LamBERTa, and also its
    superiority against widely used deep-learning text classifiers and a few-shot
    learner conceived for an attribute-aware prediction task.
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1016/J.INS.2020.08.093
  title: Attribute based diversification of seeds for targeted influence maximization
  authors:
  - "Antonio Cali\xF2"
  - Andrea Tagarelli
  publisher: Information Sciences
  date: '2021-02-01'
  link: https://doi.org/gkr9bq
  image: ./../images/mlnets.jpg
  description: "Embedding diversity into knowledge discovery is important - the patterns\
    \ mined will be more novel, more meaningful, and broader. Surprisingly, in the\
    \ classic problem of influence maximization in social networks, relatively little\
    \ study has been devoted to diversity and its integration into the objective function\
    \ of an influence maximization method. In this work, we propose the integration\
    \ of a categorical-based notion of seed diversity into the objective function\
    \ of a targeted influence maximization problem. In this respect, we assume that\
    \ the users of a social network are associated with a categorical dataset where\
    \ each tuple expresses the profile of a user according to a predefined schema\
    \ of categorical attributes. Upon this assumption, we design a class of monotone\
    \ submodular functions specifically conceived for determining the diversity of\
    \ the subset of categorical tuples associated with the seed users to be discovered.\
    \ This allows us to develop an efficient approximate method, with a constant-factor\
    \ guarantee of optimality. More precisely, we formulate the attribute-based diversity-sensitive\
    \ targeted influence maximization problem under the state-of-the-art reverse influence\
    \ sampling framework, and we develop a method, dubbed ADITUM, that ensures a (1-1/e-\u220A\
    )-approximate solution under the general triggering diffusion model. Extensive\
    \ experimental evaluation based on real-world networks as well as synthetically\
    \ generated data has shown the meaningfulness and uniqueness of our proposed class\
    \ of set diversity functions and of the ADITUM algorithm, also in comparison with\
    \ methods that exploit numerical-attribute-based diversity and topology-driven\
    \ diversity in influence maximization."
  plugin: sources.py
  file: sources.yaml
- id: doi:10.1007/978-3-030-86520-7_31
  title: Correlation Clustering with Global Weight Bounds
  authors:
  - Domenico Mandaglio
  - Andrea Tagarelli
  - Francesco Gullo
  publisher: Lecture Notes in Computer Science
  date: '2021-01-01'
  link: https://doi.org/gs8dvt
  image: ./../images/CCwGWB.jpg
  description: "Given a set of objects and nonnegative real weights expressing \u201C\
    positive\u201D and \u201Cnegative\u201D feeling of clustering any two objects\
    \ together, min-disagreement correlation clustering partitions the input object\
    \ set so as to minimize the sum of the intra-cluster negative-type weights plus\
    \ the sum of the inter-cluster positive-type weights. Min-disagreement correlation\
    \ clustering is -hard, but efficient constant-factor approximation algorithms\
    \ exist if the weights are bounded in some way. The weight bounds so far studied\
    \ in the related literature are mostly local, as they are required to hold for\
    \ every object-pair. In this paper, we introduce the problem of min-disagreement\
    \ correlation clustering with global weight bounds, i.e., constraints to be satisfied\
    \ by the input weights altogether. Our main result is a sufficient condition that\
    \ establishes when any algorithm achieving a certain approximation under the probability\
    \ constraint keeps the same guarantee on an input that violates the constraint.\
    \ This extends the range of applicability of the most prominent existing correlation-clustering\
    \ algorithms, including the popular Pivot, thus providing benefits, both theoretical\
    \ and practical. Experiments demonstrate the usefulness of our approach, in terms\
    \ of both worthiness of employing existing efficient algorithms, and guidance\
    \ on the definition of weights from feature vectors in a task of fair clustering."
  plugin: sources.py
  file: sources.yaml
