- id: doi:10.48550/arXiv.2508.01656
  title: Authorship Attribution in Multilingual Machine-Generated Texts
  authors:
  - Lucio La Cava
  - Dominik Macko
  - "R\xF3bert M\xF3ro"
  - Ivan Srba
  - Andrea Tagarelli
  publisher: arXiv
  date: '2025-08-03'
  link: https://doi.org/g95h57
  image: ./../images/default.jpg
  description: As Large Language Models (LLMs) have reached human-like fluency and
    coherence, distinguishing machine-generated text (MGT) from human-written content
    becomes increasingly difficult. While early efforts in MGT detection have focused
    on binary classification, the growing landscape and diversity of LLMs require
    a more fine-grained yet challenging authorship attribution (AA), i.e., being able
    to identify the precise generator (LLM or human) behind a text. However, AA remains
    nowadays confined to a monolingual setting, with English being the most investigated
    one, overlooking the multilingual nature and usage of modern LLMs. In this work,
    we introduce the problem of Multilingual Authorship Attribution, which involves
    attributing texts to human or multiple LLM generators across diverse languages.
    Focusing on 18 languages -- covering multiple families and writing scripts --
    and 8 generators (7 LLMs and the human-authored class), we investigate the multilingual
    suitability of monolingual AA methods, their cross-lingual transferability, and
    the impact of generators on attribution performance. Our results reveal that while
    certain monolingual AA methods can be adapted to multilingual settings, significant
    limitations and challenges remain, particularly in transferring across diverse
    language families, underscoring the complexity of multilingual AA and the need
    for more robust approaches to better match real-world scenarios.
